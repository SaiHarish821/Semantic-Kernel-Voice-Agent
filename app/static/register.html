<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Sainsbury's AI Voice Agent</title>
  <meta name="description" content="Create your Sainsbury's AI Voice Agent account to save and revisit your conversation history." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-body">
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo" aria-label="Sainsbury's">
        <span class="logo-s">S</span>
      </div>
      <div>
        <div class="auth-brand-name">Sainsbury's</div>
        <div class="auth-brand-sub">AI Voice Agent</div>
      </div>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Save your conversation history and personalise your experience</p>

    <div class="auth-alert auth-alert-error" id="reg-error" style="display:none" role="alert"></div>
    <div class="auth-alert auth-alert-success" id="reg-success" style="display:none" role="status"></div>

    <form id="reg-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full name</label>
        <input class="form-input" type="text" id="name" name="name" placeholder="Jane Smith" autocomplete="name" required minlength="2" />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="form-hint">(min. 8 characters)</span></label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required minlength="8" />
          <button type="button" class="input-eye" id="toggle-pw" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pw-strength"></div>
      </div>

      <button type="submit" class="auth-btn" id="reg-btn">
        <span id="reg-btn-text">Create account</span>
        <span id="reg-spinner" class="btn-spinner" style="display:none"></span>
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <a href="/" class="auth-btn auth-btn-ghost">🎙️ Skip — use voice as guest</a>
    <p class="auth-footer-text">Already have an account? <a href="/login" class="auth-link">Sign in</a></p>
  </div>
</div>

<script src="/static/auth.js"></script>
<script>
'use strict';

if (isLoggedIn()) window.location.href = '/dashboard';

// Background
(function() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  const orbs = Array.from({length:4},(_,i)=>({x:Math.random(),y:Math.random(),r:200+Math.random()*300,vx:(Math.random()-.5)*.0002,vy:(Math.random()-.5)*.0002,hue:i%2===0?24:145,alpha:.06+Math.random()*.06}));
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  function draw(){const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);orbs.forEach(o=>{o.x=(o.x+o.vx+1)%1;o.y=(o.y+o.vy+1)%1;const g=ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,o.r);g.addColorStop(0,`hsla(${o.hue},90%,55%,${o.alpha})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});requestAnimationFrame(draw);}
  window.addEventListener('resize',resize);resize();draw();
})();

// Toggle password
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

// Password strength indicator
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const el = document.getElementById('pw-strength');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^a-zA-Z0-9]/.test(val)) score++;
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
  el.innerHTML = val.length > 0
    ? `<div class="pw-bar"><div style="width:${score*25}%;background:${colors[score]};height:3px;border-radius:3px;transition:all 0.3s"></div></div><span style="color:${colors[score]};font-size:11px">${labels[score]}</span>`
    : '';
});

// Register form
document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('reg-error');
  const succEl = document.getElementById('reg-success');
  const btnText = document.getElementById('reg-btn-text');
  const spinner = document.getElementById('reg-spinner');

  errEl.style.display = 'none';
  succEl.style.display = 'none';

  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.style.display = 'flex';
    return;
  }

  btnText.style.display = 'none';
  spinner.style.display = 'inline-block';
  document.getElementById('reg-btn').disabled = true;

  try {
    await register(name, email, password);
    succEl.textContent = '✓ Account created! Redirecting…';
    succEl.style.display = 'flex';
    setTimeout(() => window.location.href = '/dashboard', 1200);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'flex';
  } finally {
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
    document.getElementById('reg-btn').disabled = false;
  }
});
</script>
</body>
</html>
