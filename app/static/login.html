<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sainsbury's AI Voice Agent</title>
  <meta name="description" content="Sign in to your Sainsbury's AI Voice Agent account to access your conversation history and personalised experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-body">
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo" aria-label="Sainsbury's">
        <span class="logo-s">S</span>
      </div>
      <div>
        <div class="auth-brand-name">Sainsbury's</div>
        <div class="auth-brand-sub">AI Voice Agent</div>
      </div>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to access your conversation history</p>

    <!-- Error alert -->
    <div class="auth-alert auth-alert-error" id="login-error" style="display:none" role="alert"></div>

    <!-- Form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="input-eye" id="toggle-pw" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="login-btn">
        <span id="login-btn-text">Sign in</span>
        <span id="login-spinner" class="btn-spinner" style="display:none"></span>
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider"><span>or continue as</span></div>

    <!-- Guest -->
    <a href="/" class="auth-btn auth-btn-ghost">🎙️ Guest — use voice without account</a>

    <!-- Footer link -->
    <p class="auth-footer-text">Don't have an account? <a href="/register" class="auth-link">Create one</a></p>

    <!-- Default admin hint -->
    <div class="auth-hint">
      <span>🔑</span>
      <span>Admin: <code>admin@sainsburys.co.uk</code> / <code>Admin@123</code></span>
    </div>
  </div>
</div>

<script src="/static/auth.js"></script>
<script>
'use strict';

// Redirect if already logged in
if (isLoggedIn()) window.location.href = '/dashboard';

// Background orbs (from app.js)
(function initBg() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const orbs = Array.from({ length: 4 }, (_, i) => ({
    x: Math.random(), y: Math.random(),
    r: 200 + Math.random() * 300,
    vx: (Math.random() - 0.5) * 0.0002,
    vy: (Math.random() - 0.5) * 0.0002,
    hue: i % 2 === 0 ? 24 : 145,
    alpha: 0.06 + Math.random() * 0.06,
  }));
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    orbs.forEach(o => {
      o.x = (o.x + o.vx + 1) % 1; o.y = (o.y + o.vy + 1) % 1;
      const g = ctx.createRadialGradient(o.x*W, o.y*H, 0, o.x*W, o.y*H, o.r);
      g.addColorStop(0, `hsla(${o.hue}, 90%, 55%, ${o.alpha})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize); resize(); draw();
})();

// Toggle password visibility
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

// Login form
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  const btnText = document.getElementById('login-btn-text');
  const spinner = document.getElementById('login-spinner');

  errEl.style.display = 'none';
  btnText.style.display = 'none';
  spinner.style.display = 'inline-block';
  document.getElementById('login-btn').disabled = true;

  try {
    const data = await login(email, password);
    window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'flex';
  } finally {
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
    document.getElementById('login-btn').disabled = false;
  }
});
</script>
</body>
</html>
