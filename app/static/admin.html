<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Sainsbury's AI Voice Agent</title>
  <meta name="description" content="Admin dashboard for the Sainsbury's AI Voice Agent. Manage users and monitor platform usage." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body>
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<div class="page-layout" style="position:relative;z-index:1">

  <!-- Header -->
  <header class="page-header" role="banner">
    <div class="page-header-inner">
      <a href="/" class="page-header-brand">
        <div class="brand-logo"><span class="logo-s">S</span></div>
        <div>
          <div class="page-header-title">Sainsbury's</div>
          <div class="page-header-sub">Admin Dashboard</div>
        </div>
      </a>
      <nav class="page-header-nav" role="navigation">
        <a href="/" class="nav-link">🎙️ Voice</a>
        <a href="/dashboard" class="nav-link">📋 My History</a>
        <a href="/admin" class="nav-link active">⚙️ Admin</a>
        <div class="user-chip">
          <div class="user-avatar" id="admin-avatar">A</div>
          <span id="admin-name">Admin</span>
        </div>
        <button class="nav-btn" onclick="logout()">Sign out</button>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <main class="page-content" role="main">

    <!-- Stats row -->
    <div class="stats-grid" id="stats-grid" aria-label="Platform statistics">
      <div class="stat-card skeleton" style="height:100px"></div>
      <div class="stat-card skeleton" style="height:100px"></div>
      <div class="stat-card skeleton" style="height:100px"></div>
      <div class="stat-card skeleton" style="height:100px"></div>
      <div class="stat-card skeleton" style="height:100px"></div>
    </div>

    <!-- Users table -->
    <div class="section-header">
      <h1 class="section-title">Users</h1>
      <div class="search-bar" style="width:280px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="user-search" placeholder="Search users…" aria-label="Search users" />
      </div>
    </div>

    <div class="data-table-wrap" aria-label="User list">
      <table class="data-table" id="users-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
            <th>Last login</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--text-muted)">Loading users…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- User detail panel -->
    <div id="user-detail-panel" style="display:none;margin-top:var(--space-xl)">
      <div class="section-header">
        <h2 class="section-title" id="user-detail-title">User detail</h2>
        <button class="icon-btn" onclick="closeUserDetail()" aria-label="Close panel" style="width:auto;padding:6px 12px;font-size:13px">✕ Close</button>
      </div>
      <div class="data-table-wrap">
        <div style="padding:var(--space-lg)">
          <div id="user-detail-info" style="display:flex;gap:var(--space-xl);flex-wrap:wrap;margin-bottom:var(--space-lg)"></div>
          <h3 style="font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:var(--space-md)">Conversation Sessions</h3>
          <div id="user-conv-list" class="conv-list" style="max-height:320px;overflow-y:auto"></div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="/static/auth.js"></script>
<script src="/static/admin.js"></script>
</body>
</html>
